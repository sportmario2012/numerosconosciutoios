name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:

  # ---------------------------------------------------------------
  # JOB 1: build di verifica, NON firmato. Gira subito, senza secret.
  # Serve solo a controllare che il progetto compili. Non produce
  # un IPA installabile (le app iOS devono essere firmate per girare
  # su un dispositivo reale, anche in sideload).
  # ---------------------------------------------------------------
  build-verifica:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Installa XcodeGen
        run: brew install xcodegen

      - name: Genera il progetto Xcode
        run: xcodegen generate

      - name: Seleziona versione Xcode più recente
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build senza firma (solo verifica compilazione)
        run: |
          xcodebuild build \
            -project NumeroSconosciuto.xcodeproj \
            -scheme NumeroSconosciuto \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

  # ---------------------------------------------------------------
  # JOB 2: archive + export IPA firmato, installabile via sideload
  # (AltStore/Sideloadly) o TestFlight. Richiede secret nel repo:
  #
  #   APPLE_CERTIFICATE_P12_BASE64   -> certificato .p12 in base64
  #   APPLE_CERTIFICATE_PASSWORD     -> password del .p12
  #   APPLE_PROVISIONING_PROFILE_B64 -> profilo .mobileprovision in base64
  #   APPLE_TEAM_ID                  -> il tuo Team ID (developer.apple.com)
  # ---------------------------------------------------------------
  build-e-firma:
    runs-on: macos-14
    if: github.event_name == 'workflow_dispatch'
    needs: build-verifica
    steps:
      - uses: actions/checkout@v4

      - name: Installa XcodeGen
        run: brew install xcodegen

      - name: Genera il progetto Xcode
        run: xcodegen generate

      - name: Importa certificato e provisioning profile
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_B64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          echo "$PROFILE_BASE64" | base64 --decode > $RUNNER_TEMP/profile.mobileprovision

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project NumeroSconosciuto.xcodeproj \
            -scheme NumeroSconosciuto \
            -archivePath $RUNNER_TEMP/NumeroSconosciuto.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Manual

      - name: Esporta IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NumeroSconosciuto.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist exportOptions.plist

      - name: Carica IPA come artifact
        uses: actions/upload-artifact@v4
        with:
          name: NumeroSconosciuto-ipa
          path: ${{ runner.temp }}/export/*.ipa
