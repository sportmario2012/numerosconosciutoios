name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:

  # ---------------------------------------------------------------
  # JOB 1: build di verifica, NON firmato. Gira subito, senza secret.
  # Serve solo a controllare che il progetto compili. Non produce
  # un IPA installabile (le app iOS devono essere firmate per girare
  # su un dispositivo reale, anche in sideload).
  # ---------------------------------------------------------------
  build-verifica:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Installa XcodeGen
        run: brew install xcodegen

      - name: Genera il progetto Xcode
        run: xcodegen generate

      - name: Seleziona versione Xcode più recente
     run: |
       sudo xcode-select -s /Applications/Xcode.app
       xcodebuild -version

      - name: Build senza firma (solo verifica compilazione)
        run: |
          xcodebuild build \
            -project NumeroSconosciuto.xcodeproj \
            -scheme NumeroSconosciuto \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

  # ---------------------------------------------------------------
  # JOB 2: archive + export IPA firmato, installabile via sideload
  # (AltStore/Sideloadly) o TestFlight. Richiede secret nel repo:
  #
  #   APPLE_CERTIFICATE_P12_BASE64   -> certificato .p12 in base64
  #   APPLE_CERTIFICATE_PASSWORD     -> password del .p12
  #   APPLE_PROVISIONING_PROFILE_B64 -> profilo .mobileprovision in base64
  #   APPLE_TEAM_ID                  -> il tuo Team ID (developer.apple.com)
  #
  # Come ottenere i secret (da fare UNA VOLTA su Mac o anche senza Mac
  # tramite il portale developer.apple.com):
  #   1. developer.apple.com > Certificates > crea un certificato
  #      "Apple Distribution" o "Apple Development", scarica il .p12
  #      (serve esportarlo da Keychain se lo generi da Xcode; se non hai
  #      un Mac, puoi generare CSR e certificato interamente dal portale
  #      con OpenSSL su qualunque OS, poi importarlo in un .p12 con OpenSSL).
  #   2. developer.apple.com > Identifiers > registra i due Bundle ID
  #      (com.marioadj.numerosconosciuto e .CallDirectoryExtension) e
  #      abilita la capability "App Groups" su entrambi, creando il
  #      gruppo group.com.marioadj.numerosconosciuto.
  #   3. developer.apple.com > Profiles > crea un provisioning profile
  #      per ciascun target, scarica i .mobileprovision.
  #   4. Converti in base64: `base64 -i file.p12 | pbcopy` (Mac) o
  #      `base64 -w0 file.p12` (Linux) e incolla il risultato come
  #      GitHub Secret (Settings > Secrets and variables > Actions).
  #
  # NB: la Call Directory Extension richiede un Apple ID con Developer
  # Program attivo (99$/anno) per un profilo installabile su device reale
  # in modo stabile — un "personal team" gratuito funziona ma con firma
  # che scade dopo 7 giorni. [UNCERTAIN: verifica in Xcode se la capability
  # "App Groups" risulta disponibile anche su personal team gratuito nel
  # tuo caso specifico, prima di investire tempo nel resto del setup.]
  # ---------------------------------------------------------------
  build-e-firma:
    runs-on: macos-14
    if: github.event_name == 'workflow_dispatch'
    needs: build-verifica
    steps:
      - uses: actions/checkout@v4

      - name: Installa XcodeGen
        run: brew install xcodegen

      - name: Genera il progetto Xcode
        run: xcodegen generate

      - name: Importa certificato e provisioning profile
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_B64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          echo "$PROFILE_BASE64" | base64 --decode > $RUNNER_TEMP/profile.mobileprovision

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project NumeroSconosciuto.xcodeproj \
            -scheme NumeroSconosciuto \
            -archivePath $RUNNER_TEMP/NumeroSconosciuto.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Manual

      - name: Esporta IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NumeroSconosciuto.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist exportOptions.plist

      - name: Carica IPA come artifact
        uses: actions/upload-artifact@v4
        with:
          name: NumeroSconosciuto-ipa
          path: ${{ runner.temp }}/export/*.ipa
